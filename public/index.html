<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Capito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sora', -apple-system, 'Helvetica Neue', sans-serif;
      background: #FAF8F5;
      color: #3D3529;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .top-bar {
      background: #F0EDE8;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #E5E0D9;
      flex-shrink: 0;
    }

    .top-bar select {
      font-family: inherit;
      font-size: 13px;
      padding: 6px 10px;
      border: 1px solid #D5CFC7;
      border-radius: 6px;
      background: #FAF8F5;
      color: #3D3529;
      cursor: pointer;
    }

    .top-bar button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      background: #3D3529;
      color: #FAF8F5;
      cursor: pointer;
    }

    .top-bar button:hover { background: #2A241B; }

    .top-bar button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #8A8780;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #D0171B;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .hidden { display: none; }

    /* Error banner */
    .error-banner {
      background: #FDF0F0;
      color: #9B1C1C;
      padding: 10px 20px;
      font-size: 13px;
      border-bottom: 1px solid #F5D0D0;
    }

    /* Transcript area */
    .transcript {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
    }

    .transcript-line {
      font-size: 19px;
      line-height: 1.6;
      margin-bottom: 8px;
      color: #C4B5A5;
      transition: color 0.3s ease;
    }

    .transcript-line.active {
      color: #3D3529;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <select id="mic-select">
      <option value="">Loading devices…</option>
    </select>
    <button id="start-btn">Start</button>
    <div id="status" class="status hidden">
      <div class="status-dot"></div>
      <span>Capturing</span>
    </div>
  </div>
  <div id="error-banner" class="error-banner hidden"></div>
  <div id="transcript" class="transcript"></div>

  <script>
    const micSelect = document.getElementById('mic-select');
    const startBtn = document.getElementById('start-btn');
    const status = document.getElementById('status');
    const errorBanner = document.getElementById('error-banner');
    const transcript = document.getElementById('transcript');

    // In-memory transcript data (structured for future persistence)
    const lines = [];

    let audioContext = null;
    let source = null;
    let pcmNode = null;
    let ws = null;
    let activeLine = null;

    // --- Device enumeration ---

    async function loadDevices() {
      try {
        // Request permission first (needed to get device labels)
        const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        tempStream.getTracks().forEach(t => t.stop());

        const devices = await navigator.mediaDevices.enumerateDevices();
        const audioInputs = devices.filter(d => d.kind === 'audioinput');

        micSelect.innerHTML = '';
        for (const device of audioInputs) {
          const option = document.createElement('option');
          option.value = device.deviceId;
          option.textContent = device.label || `Microphone ${micSelect.length + 1}`;
          micSelect.appendChild(option);
        }
      } catch (err) {
        showError('Microphone access denied — check browser permissions');
      }
    }

    // --- Error display ---

    function showError(message) {
      errorBanner.textContent = message;
      errorBanner.classList.remove('hidden');
    }

    // --- Transcript rendering ---

    function createNewLine() {
      // Dim the previous active line
      if (activeLine) {
        activeLine.classList.remove('active');
      }

      activeLine = document.createElement('div');
      activeLine.className = 'transcript-line active';
      transcript.appendChild(activeLine);

      lines.push({ text: '', timestamp: Date.now(), final: false });
    }

    function appendDelta(text) {
      if (!activeLine) createNewLine();
      activeLine.textContent += text;
      lines[lines.length - 1].text += text;
      transcript.scrollTop = transcript.scrollHeight;
    }

    function finaliseLine(text) {
      if (activeLine) {
        if (text) activeLine.textContent = text;
        lines[lines.length - 1].text = activeLine.textContent;
        lines[lines.length - 1].final = true;
      }
      activeLine = null;
    }

    // --- WebSocket message handling ---

    function handleEvent(event) {
      switch (event.type) {
        case 'transcription.text.delta':
          appendDelta(event.text);
          break;

        case 'transcription.done':
          finaliseLine(event.text);
          break;

        case 'transcription.language':
          console.log('[capito] Detected language:', event.audioLanguage);
          break;

        case 'error': {
          const msg = event.error
            ? typeof event.error.message === 'string'
              ? event.error.message
              : JSON.stringify(event.error.message)
            : event.message || 'Unknown error';
          showError(msg);
          break;
        }
      }
    }

    // --- Start transcription ---

    async function start() {
      startBtn.disabled = true;

      try {
        // 1. Get mic stream with selected device
        const constraints = {
          audio: {
            deviceId: micSelect.value ? { exact: micSelect.value } : undefined,
            channelCount: 1,
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
          },
        };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);

        // 2. AudioContext at 16kHz (browser auto-resamples)
        audioContext = new AudioContext({ sampleRate: 16000 });
        if (audioContext.state === 'suspended') await audioContext.resume();

        // 3. Load AudioWorklet
        await audioContext.audioWorklet.addModule('/pcm-processor.js');

        // 4. Connect pipeline: mic → worklet
        source = audioContext.createMediaStreamSource(stream);
        pcmNode = new AudioWorkletNode(audioContext, 'pcm-processor');
        source.connect(pcmNode);
        // Do NOT connect to destination — we don't want playback

        // 5. Open WebSocket
        const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${wsProtocol}//${location.host}`);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
          // 6. Wire AudioWorklet output → WebSocket
          pcmNode.port.onmessage = (e) => {
            if (ws.readyState === WebSocket.OPEN && ws.bufferedAmount < 65536) {
              ws.send(e.data);
            }
          };

          // Update UI
          startBtn.classList.add('hidden');
          status.classList.remove('hidden');
          micSelect.disabled = true;

          // Create first transcript line
          createNewLine();
        };

        ws.onmessage = (e) => {
          try {
            handleEvent(JSON.parse(e.data));
          } catch (err) {
            console.error('[capito] Failed to parse event:', err);
          }
        };

        ws.onclose = () => {
          showError('Connection lost — refresh the page');
        };

        ws.onerror = () => {
          showError('Connection lost — refresh the page');
        };
      } catch (err) {
        showError(
          err.name === 'NotAllowedError'
            ? 'Microphone access denied — check browser permissions'
            : `Error: ${err.message}`
        );
        startBtn.disabled = false;
      }
    }

    // --- Teardown (on page unload) ---

    function teardown() {
      if (pcmNode) {
        pcmNode.port.onmessage = null;
        pcmNode.disconnect();
      }
      if (source) {
        source.mediaStream.getTracks().forEach(t => t.stop());
        source.disconnect();
      }
      if (audioContext) audioContext.close();
      if (ws && ws.readyState === WebSocket.OPEN) ws.close(1000, 'Page unload');
    }

    window.addEventListener('beforeunload', teardown);

    // --- Init ---

    startBtn.addEventListener('click', start);
    loadDevices();
  </script>
</body>
</html>

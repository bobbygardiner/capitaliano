<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Capitaliano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF8F5;
      --surface: #F0EDE8;
      --border: #E5E0D9;
      --border-strong: #D5CFC7;
      --text: #3D3529;
      --text-muted: #C4B5A5;
      --text-secondary: #8A8780;
      --accent: #D0171B;
      --entity-player: #B07D4B;
      --entity-team: #D0171B;
      --entity-stadium: #6B8F71;
      --entity-coach: #7B6B8A;
      --shadow-sm: 0 1px 3px rgba(61, 53, 41, 0.06);
      --shadow-md: 0 4px 16px rgba(61, 53, 41, 0.08);
      --shadow-lg: 0 8px 32px rgba(61, 53, 41, 0.12);
      --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sora', -apple-system, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      animation: appEnter 0.5s var(--ease-out) both;
    }

    @keyframes appEnter {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- Top bar --- */
    .top-bar {
      background: var(--surface);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .top-bar button, .top-bar .toggle-btn {
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      background: var(--text);
      color: var(--bg);
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s ease;
      white-space: nowrap;
    }

    .top-bar button:hover:not(:disabled), .top-bar .toggle-btn:hover {
      background: #2A241B;
    }

    .top-bar button:active:not(:disabled), .top-bar .toggle-btn:active {
      transform: scale(0.97);
    }

    .top-bar button:disabled { opacity: 0.4; cursor: default; }

    .top-bar button:focus-visible, .top-bar .toggle-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .sessions-btn {
      background: transparent !important;
      color: var(--text-secondary) !important;
      padding: 6px 8px !important;
      font-size: 16px !important;
      line-height: 1;
    }

    .sessions-btn:hover:not(:disabled) {
      background: var(--border) !important;
      color: var(--text) !important;
    }

    .secondary-btn {
      background: transparent !important;
      color: var(--text-secondary) !important;
      border: 1px solid var(--border-strong) !important;
    }

    .secondary-btn:hover:not(:disabled) {
      background: var(--surface) !important;
      color: var(--text) !important;
    }

    .toggle-btn {
      border: 1px solid var(--border-strong) !important;
      background: transparent !important;
      color: var(--text-secondary) !important;
    }

    .toggle-btn:hover {
      background: var(--surface) !important;
      color: var(--text) !important;
    }

    .toggle-btn.active {
      background: var(--text) !important;
      color: var(--bg) !important;
      border-color: var(--text) !important;
    }

    .top-bar select {
      font-family: inherit;
      font-size: 12px;
      padding: 6px 28px 6px 10px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238A8780' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
      transition: border-color 0.15s ease;
    }

    .top-bar select:focus { border-color: var(--text); outline: none; }

    .session-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .spacer { flex: 1; }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .cost-indicator {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    .hidden { display: none !important; }

    /* --- Error banner --- */
    .error-banner {
      background: #FDF0F0;
      color: #9B1C1C;
      padding: 10px 20px;
      font-size: 13px;
      border-bottom: 1px solid #F5D0D0;
    }

    /* --- Transcript area --- */
    .transcript {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 80px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: var(--border-strong) transparent;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .transcript::-webkit-scrollbar { width: 4px; }
    .transcript::-webkit-scrollbar-track { background: transparent; }
    .transcript::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    .transcript::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    .waiting-indicator {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 400;
      animation: waitPulse 2s ease-in-out infinite;
    }

    @keyframes waitPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.3; }
    }

    .transcript-line {
      margin-bottom: 14px;
      opacity: 1;
      font-weight: 400;
      max-width: 720px;
      transition: opacity 0.6s var(--ease-out), font-weight 0.3s ease;
      will-change: opacity;
    }

    /* Karaoke cascade only when live-streaming */
    .transcript.live .transcript-line {
      opacity: 0.35;
      font-weight: 300;
    }

    .transcript.live .transcript-line.active {
      opacity: 1;
      font-weight: 500;
      animation: lineEnter 0.4s var(--ease-out) both;
    }

    .transcript.live .transcript-line.recent-1 { opacity: 0.7; font-weight: 400; }
    .transcript.live .transcript-line.recent-2 { opacity: 0.5; font-weight: 300; }

    /* When user scrolls up during live, un-dim for readability */
    .transcript.live.scrolled-up .transcript-line {
      opacity: 0.8;
      font-weight: 400;
    }

    .transcript.live.scrolled-up .transcript-line.active {
      opacity: 1;
      font-weight: 500;
    }

    @keyframes lineEnter {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .line-timestamp {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      color: #A89A8A;
      margin-bottom: 2px;
    }

    .line-italian {
      font-size: 17px;
      line-height: 1.6;
      color: var(--text);
    }

    /* Segmented translation pairs — flow inline like a paragraph */
    .line-segments {
      font-size: 17px;
      line-height: 1.6;
      color: var(--text);
    }

    .segment-pair {
      display: inline;
    }

    .segment-italian {
      display: inline;
    }

    .segment-translation {
      display: none;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 400;
      color: #736860;
      font-style: italic;
      padding-left: 2px;
    }

    .show-translations .segment-pair {
      display: inline-block;
      vertical-align: top;
      margin-bottom: 6px;
    }

    .show-translations .segment-translation {
      display: block;
      margin-bottom: 2px;
    }

    /* Fallback: monolithic translation (when no segments available) */
    .line-translation {
      font-size: 13px;
      line-height: 1.45;
      font-weight: 400;
      color: #736860;
      font-style: italic;
      margin-top: 2px;
      padding-left: 2px;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.35s var(--ease-out), opacity 0.3s ease 0.05s;
    }

    .show-translations .line-translation {
      max-height: 4em;
      opacity: 1;
    }

    /* --- Entity highlighting --- */
    [data-entity] {
      text-decoration: underline;
      text-decoration-style: solid;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
      cursor: default;
      transition: background-color 0.2s ease;
      border-radius: 2px;
      padding: 0 1px;
    }

    [data-entity]:hover {
      background-color: color-mix(in srgb, var(--entity-color) 12%, transparent);
    }

    [data-entity="player"] { --entity-color: var(--entity-player); text-decoration-color: var(--entity-player); }
    [data-entity="team"] { --entity-color: var(--entity-team); text-decoration-color: var(--entity-team); }
    [data-entity="stadium"] { --entity-color: var(--entity-stadium); text-decoration-color: var(--entity-stadium); }
    [data-entity="coach"] { --entity-color: var(--entity-coach); text-decoration-color: var(--entity-coach); }

    /* --- Idiom highlighting --- */
    [data-idiom] {
      text-decoration: underline;
      text-decoration-style: dotted;
      text-decoration-color: var(--text-muted);
      text-decoration-thickness: 1.5px;
      text-underline-offset: 3px;
      cursor: help;
      position: relative;
    }

    [data-idiom]::before {
      content: attr(data-idiom);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      transform: translateY(4px);
      min-width: 200px;
      max-width: 380px;
      white-space: normal;
      background: var(--text);
      color: var(--bg);
      font-size: 13px;
      font-weight: 400;
      font-style: normal;
      line-height: 1.5;
      padding: 10px 14px;
      border-radius: 8px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s var(--ease-out), transform 0.2s var(--ease-out), visibility 0.2s;
      z-index: 50;
    }

    [data-idiom]::after {
      content: '';
      position: absolute;
      bottom: calc(100% + 2px);
      left: 12px;
      border: 6px solid transparent;
      border-top-color: var(--text);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s var(--ease-out), visibility 0.2s;
      z-index: 50;
    }

    [data-idiom]:hover::before, [data-idiom]:focus::before {
      opacity: 1; visibility: visible; transform: translateY(0);
    }
    [data-idiom]:hover::after, [data-idiom]:focus::after {
      opacity: 1; visibility: visible;
    }

    /* Flip tooltip below when near top of page */
    [data-idiom].tooltip-below::before {
      bottom: auto;
      top: calc(100% + 8px);
      transform: translateY(-4px);
    }

    [data-idiom].tooltip-below:hover::before,
    [data-idiom].tooltip-below:focus::before {
      transform: translateY(0);
    }

    [data-idiom].tooltip-below::after {
      bottom: auto;
      top: calc(100% + 2px);
      border-top-color: transparent;
      border-bottom-color: var(--text);
    }

    /* --- Sessions panel --- */
    .sessions-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(61, 53, 41, 0.15);
      z-index: 99;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s;
    }

    .sessions-backdrop.open { opacity: 1; visibility: visible; }

    .sessions-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 300px;
      height: 100vh;
      background: var(--bg);
      border-right: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      z-index: 100;
      overflow-y: auto;
      transform: translateX(-100%);
      transition: transform 0.3s var(--ease-out);
      display: flex;
      flex-direction: column;
    }

    .sessions-panel.open { transform: translateX(0); }

    .sessions-header {
      padding: 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sessions-header button {
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      padding: 5px 12px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .sessions-header button:hover {
      background: var(--surface);
      color: var(--text);
    }

    .sessions-list { flex: 1; padding: 4px 0; }

    .session-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background-color 0.15s ease;
      border-left: 3px solid transparent;
    }

    .session-item:hover { background: var(--surface); }

    .session-item.active {
      border-left-color: var(--accent);
      background: var(--surface);
    }

    .session-item.active .session-label { font-weight: 500; }

    .session-action-btn {
      font-family: inherit;
      font-size: 11px;
      padding: 3px 10px;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s ease;
    }

    .session-action-btn:hover {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .session-live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .session-dot-spacer { width: 6px; flex-shrink: 0; }

    .session-label {
      font-size: 13px;
      color: var(--text);
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }

    /* --- Tab switcher --- */
    .tab-bar {
      display: flex;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      padding: 0 20px;
    }

    .tab-btn {
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s ease, border-color 0.15s ease;
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    .tab-bar.disabled .tab-btn {
      color: var(--border-strong);
      pointer-events: none;
    }

    .tab-content { display: none; flex: 1; overflow-y: auto; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* --- Vocab panel --- */
    .vocab-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border-strong) transparent;
    }

    .vocab-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .vocab-item:last-child { border-bottom: none; }

    .vocab-expression {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      text-decoration: underline;
      text-decoration-style: dotted;
      text-decoration-color: var(--text-muted);
      text-decoration-thickness: 1.5px;
      text-underline-offset: 3px;
    }

    .vocab-meaning {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
      line-height: 1.5;
    }

    .vocab-context {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      margin-top: 4px;
      line-height: 1.4;
    }

    .vocab-time {
      font-size: 11px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      margin-top: 4px;
    }

    .vocab-empty {
      color: var(--text-muted);
      font-size: 14px;
      padding: 40px 20px;
      text-align: center;
    }

    /* --- Empty state --- */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--text-muted);
      font-size: 14px;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }

    .empty-state-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* --- Pending analysis shimmer --- */
    .transcript-line.pending-analysis .line-italian,
    .transcript-line.pending-analysis .segment-italian {
      background: linear-gradient(90deg, transparent 25%, rgba(61, 53, 41, 0.03) 50%, transparent 75%);
      background-size: 200% 100%;
      animation: shimmer 2s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* --- New session form --- */
    .new-session-form {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .new-session-form input,
    .new-session-form textarea {
      width: 100%;
      font-family: inherit;
      font-size: 13px;
      padding: 8px 10px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      margin-bottom: 8px;
      resize: vertical;
    }

    .new-session-form input:focus,
    .new-session-form textarea:focus {
      border-color: var(--text);
      outline: none;
    }

    .new-session-actions {
      display: flex;
      gap: 8px;
    }

    .new-session-actions button {
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #create-session-btn {
      background: var(--text);
      color: var(--bg);
    }

    #cancel-session-btn {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-strong);
    }

    .context-search-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .context-search-label {
      font-size: 12px;
      color: var(--text-secondary);
      user-select: none;
    }

    .context-search-toggle {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .context-search-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--border-strong);
      border-radius: 10px;
      transition: background 0.2s var(--ease-out);
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background: var(--bg);
      border-radius: 50%;
      transition: transform 0.2s var(--ease-out);
    }

    .context-search-toggle input:checked + .toggle-slider {
      background: var(--accent);
    }

    .context-search-toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }

    .context-search-label.searching {
      color: var(--accent);
    }

    .content-type-select {
      font-family: inherit;
      font-size: 12px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      flex-shrink: 0;
    }

    .content-type-select:focus {
      border-color: var(--text);
      outline: none;
    }

    .add-type-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .add-type-row input {
      flex: 1;
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
    }

    .add-type-row input:focus {
      border-color: var(--text);
      outline: none;
    }

    .add-type-row button {
      font-family: inherit;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
    }

    .add-type-row #add-type-btn {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    /* --- Edit context modal --- */
    .edit-context-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(61, 53, 41, 0.15);
      z-index: 199;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s;
    }

    .edit-context-backdrop.open { opacity: 1; visibility: visible; }

    .edit-context-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      width: 420px;
      max-width: 90vw;
      max-height: 80vh;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      z-index: 200;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s, transform 0.3s var(--ease-out);
    }

    .edit-context-panel.open {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .edit-context-panel h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }

    .edit-context-panel input,
    .edit-context-panel textarea {
      width: 100%;
      font-family: inherit;
      font-size: 13px;
      padding: 8px 10px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      margin-bottom: 8px;
      resize: vertical;
    }

    .edit-context-panel input:focus,
    .edit-context-panel textarea:focus {
      border-color: var(--text);
      outline: none;
    }

    .edit-context-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .edit-context-actions button {
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #save-context-btn {
      background: var(--text);
      color: var(--bg);
    }

    #cancel-context-btn {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-strong);
    }

    .edit-session-btn {
      font-family: inherit;
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      margin-left: 6px;
    }

    .edit-session-btn:hover {
      background: var(--surface);
      color: var(--text);
    }

    .transcript-line.upgrading {
      animation: upgrade-fade 200ms ease-out;
    }
    @keyframes upgrade-fade {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }

    /* Phase comparison toggle */
    .line-phase-toggle {
      display: none;
      font-size: 10px;
      color: var(--accent);
      cursor: pointer;
      user-select: none;
      margin-top: 2px;
      opacity: 0.6;
      transition: opacity 0.2s ease;
    }
    .line-phase-toggle:hover { opacity: 1; }
    .transcript-line.has-upgrade .line-phase-toggle { display: inline-block; }

    .line-phase1 {
      display: none;
      font-size: 13px;
      line-height: 1.4;
      color: #A89A8A;
      margin-top: 4px;
      padding: 4px 8px;
      border-left: 2px solid #D8CCBE;
      background: color-mix(in srgb, var(--surface) 50%, transparent);
      border-radius: 0 4px 4px 0;
    }
    .transcript-line.show-phase1 .line-phase1 { display: block; }

    /* --- Audio play button --- */
    .line-play-btn {
      display: inline-block;
      cursor: pointer;
      font-size: 10px;
      color: var(--text-muted);
      margin-right: 4px;
      transition: color 0.15s ease;
      user-select: none;
      vertical-align: baseline;
    }

    .line-play-btn:hover {
      color: var(--accent);
    }

    .line-play-btn.playing {
      color: var(--accent);
    }

    .vocab-play-btn {
      cursor: pointer;
      font-size: 10px;
      color: var(--text-muted);
      transition: color 0.15s ease;
      user-select: none;
    }

    .vocab-play-btn:hover {
      color: var(--accent);
    }
  </style>
</head>
<body class="show-translations">
  <!-- Sessions panel -->
  <div id="sessions-backdrop" class="sessions-backdrop"></div>
  <div id="sessions-panel" class="sessions-panel">
    <div class="sessions-header">
      <span>Sessions</span>
      <button id="new-session-btn">+ New</button>
    </div>
    <div id="new-session-form" class="new-session-form hidden">
      <input type="text" id="session-name-input" placeholder="e.g. Napoli vs Milan" />
      <div class="context-search-row">
        <select id="content-type-select" class="content-type-select">
          <option value="">Loading...</option>
        </select>
        <label class="context-search-toggle">
          <input type="checkbox" id="context-search-toggle" />
          <span class="toggle-slider"></span>
        </label>
        <span class="context-search-label" id="context-search-label">Search for context</span>
      </div>
      <div id="add-type-row" class="add-type-row hidden">
        <input type="text" id="add-type-input" placeholder="e.g. Opera, Cooking Show" />
        <button id="add-type-btn">Add</button>
        <button id="cancel-type-btn" class="secondary-btn">Cancel</button>
      </div>
      <textarea id="session-context-input" rows="4" placeholder="Context (optional) — use search above or type manually"></textarea>
      <div class="new-session-actions">
        <button id="create-session-btn">Create</button>
        <button id="cancel-session-btn" class="secondary-btn">Cancel</button>
      </div>
    </div>
    <div id="sessions-list" class="sessions-list"></div>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <button id="sessions-toggle" class="sessions-btn" title="Sessions">&#9776;</button>
    <select id="mic-select">
      <option value="">Loading devices…</option>
    </select>
    <span id="session-name" class="session-name hidden"></span>
    <button id="edit-session-btn" class="edit-session-btn hidden" title="Edit session context">&#9998;</button>
    <span id="cost-indicator" class="cost-indicator hidden"></span>
    <div class="spacer"></div>
    <div id="status" class="status hidden">
      <div class="status-dot"></div>
      <span>Live</span>
    </div>
    <button id="start-btn">Start</button>
    <button id="stop-btn" class="hidden">Stop</button>
    <button id="translation-toggle" class="toggle-btn active" title="Toggle translations">EN</button>
  </div>

  <div id="error-banner" class="error-banner hidden"></div>
  <div id="tab-bar" class="tab-bar disabled">
    <button class="tab-btn active" data-tab="transcript">Transcript</button>
    <button class="tab-btn" data-tab="vocab">Vocab</button>
  </div>
  <div id="transcript" class="transcript tab-content active">
    <div id="empty-state" class="empty-state">
      <div class="empty-state-title">Capito</div>
      <div>Create a session and start capturing Italian audio</div>
    </div>
  </div>
  <div id="vocab-panel" class="tab-content">
    <div id="vocab-list" class="vocab-list">
      <div class="vocab-empty">No vocabulary collected yet</div>
    </div>
  </div>

  <!-- Edit context modal -->
  <div id="edit-context-backdrop" class="edit-context-backdrop"></div>
  <div id="edit-context-panel" class="edit-context-panel">
    <h3>Edit Session</h3>
    <input type="text" id="edit-context-name" placeholder="Session name" />
    <textarea id="edit-context-textarea" rows="6" placeholder="Match context (squad names, coaches, stadium)"></textarea>
    <div class="edit-context-actions">
      <button id="cancel-context-btn" class="secondary-btn">Cancel</button>
      <button id="save-context-btn">Save</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
